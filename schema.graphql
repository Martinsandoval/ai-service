schema {
    query: Query
    mutation: Mutation
}

type CreateEmbeddingResult {
    success: Boolean!
    errors: [String]
}

type GetSuggestionForTextResult {
    result: String!
    errors: [String]
}

type Query {
    getSuggestionForText(text: String!): GetSuggestionForTextResult!
}

type Mutation {
    createEmbedding(document: String!): CreateEmbeddingResult!
}
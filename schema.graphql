schema {
    query: Query
    mutation: Mutation
}

type CreateEmbeddingResult {
    "The result of the createEmbedding mutation."
    result: Boolean!
    "An array of error messages for when the mutation fails"
    errors: [String]
}

type CreateEmbeddingsFromProjectResult {
    "The result of the createEmbeddingsFromProject mutation."
    result: Boolean!
    "An array of error messages for when the mutation fails"
    errors: [String]
}

type GetSuggestionForTextResult {
    "The result of the getSuggestionForText query."
    result: String!
    "An array of error messages for when the query fails"
    errors: [String]
}

type GetCodeSolutionForQuestion {
    "The result of the getCodeSolutionForQuestion mutation."
    result: String!
    "An array of error messages for when the query fails"
    errors: [String]
}

type GetAnswerForQuestionAndCreateFileResult {
    "The result of the getAnswerForQuestionAndCreateFile query."
    result: String!
    "An array of error messages for when the query fails"
    errors: [String]
}


type Query {
    "Returns a suggested text for a given string."
    getSuggestionForText(text: String!): GetSuggestionForTextResult!
    "Returns an answer for given question."
    getCodeSolutionForQuestion(question: String!): GetCodeSolutionForQuestion!
}

type Mutation {
    "Creates an embedding and store it on the vector db."
    createEmbedding(document: String!): CreateEmbeddingResult!
    "Creates embeddings for all files on the specified path."
    createEmbeddingsFromProject(repo_path: String!, file_extensions: [String!]!, use_default_db: Boolean!): CreateEmbeddingsFromProjectResult!
    "Returns a code file for given question."
    getAnswerForQuestionAndCreateFile(question: String!, directory_path: String!, filename: String!): GetAnswerForQuestionAndCreateFileResult!
}